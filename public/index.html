<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Municipal Performance Management System</title>
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sa-flag-colors {
            background: linear-gradient(45deg, #007A4D 25%, #FFB612 25%, #FFB612 50%, #DE3831 50%, #DE3831 75%, #002395 75%);
        }
        .chat-widget {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [chatOpen, setChatOpen] = useState(false);
            const [notifications, setNotifications] = useState([
                { id: 1, message: "Water service compliance below threshold", type: "warning", time: "2 min ago" },
                { id: 2, message: "Monthly report generated successfully", type: "success", time: "1 hour ago" },
                { id: 3, message: "CSD registration renewal due in 30 days", type: "info", time: "3 hours ago" }
            ]);

            const menuItems = [
                { id: 'dashboard', icon: 'fas fa-tachometer-alt', label: 'Dashboard', active: true },
                { id: 'kpis', icon: 'fas fa-chart-line', label: 'KPI Tracking' },
                { id: 'departments', icon: 'fas fa-building', label: 'Departments' },
                { id: 'compliance', icon: 'fas fa-shield-alt', label: 'Compliance' },
                { id: 'reports', icon: 'fas fa-file-alt', label: 'Reports' },
                { id: 'users', icon: 'fas fa-users', label: 'User Management' },
                { id: 'settings', icon: 'fas fa-cog', label: 'Settings' }
            ];

            const kpiData = [
                { name: 'Service Delivery', current: 87, target: 90, status: 'warning', trend: 'up' },
                { name: 'Financial Health', current: 94, target: 85, status: 'good', trend: 'up' },
                { name: 'Compliance Score', current: 82, target: 95, status: 'critical', trend: 'down' },
                { name: 'Infrastructure', current: 91, target: 88, status: 'good', trend: 'up' }
            ];

            const ChatWidget = () => (
                <div className="fixed bottom-4 right-4 z-50">
                    {chatOpen && (
                        <div className="mb-4 w-80 h-96 bg-white rounded-lg shadow-xl border">
                            <div className="bg-green-600 text-white p-4 rounded-t-lg flex justify-between items-center">
                                <h3 className="font-semibold">Municipal Assistant</h3>
                                <button onClick={() => setChatOpen(false)} className="text-white hover:text-gray-200">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            <div className="p-4 h-64 overflow-y-auto">
                                <div className="mb-4">
                                    <div className="bg-gray-100 p-3 rounded-lg mb-2">
                                        <p className="text-sm">Hello! I'm your municipal performance assistant. How can I help you today?</p>
                                    </div>
                                    <div className="bg-green-100 p-3 rounded-lg ml-8">
                                        <p className="text-sm">Can you show me the latest compliance metrics?</p>
                                    </div>
                                </div>
                            </div>
                            <div className="p-4 border-t">
                                <div className="flex space-x-2">
                                    <input type="text" placeholder="Type your message..." className="flex-1 border rounded-lg px-3 py-2 text-sm" />
                                    <button className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                                        <i className="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <button
                        onClick={() => setChatOpen(!chatOpen)}
                        className="bg-green-600 hover:bg-green-700 text-white rounded-full p-4 shadow-lg chat-widget"
                    >
                        <i className={`fas ${chatOpen ? 'fa-times' : 'fa-comments'} text-xl`}></i>
                    </button>
                </div>
            );

            const Sidebar = () => (
                <div className={`${sidebarOpen ? 'w-64' : 'w-16'} bg-white shadow-lg transition-all duration-300 h-full`}>
                    <div className="p-4">
                        <div className="flex items-center space-x-3">
                            <div className="w-8 h-8 sa-flag-colors rounded"></div>
                            {sidebarOpen && (
                                <div>
                                    <h2 className="font-bold text-gray-800">Municipal PMS</h2>
                                    <p className="text-xs text-gray-500">Performance Management</p>
                                </div>
                            )}
                        </div>
                    </div>
                    <nav className="mt-8">
                        {menuItems.map((item) => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center space-x-3 px-4 py-3 text-left hover:bg-gray-100 ${
                                    activeTab === item.id ? 'bg-green-50 border-r-4 border-green-600 text-green-600' : 'text-gray-600'
                                }`}
                            >
                                <i className={`${item.icon} w-5`}></i>
                                {sidebarOpen && <span>{item.label}</span>}
                            </button>
                        ))}
                    </nav>
                </div>
            );

            const Header = () => (
                <header className="bg-white shadow-sm border-b">
                    <div className="flex items-center justify-between px-6 py-4">
                        <div className="flex items-center space-x-4">
                            <button
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="text-gray-600 hover:text-gray-800"
                            >
                                <i className="fas fa-bars"></i>
                            </button>
                            <h1 className="text-xl font-semibold text-gray-800">Municipal Performance Dashboard</h1>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="relative">
                                <button className="text-gray-600 hover:text-gray-800 relative">
                                    <i className="fas fa-bell"></i>
                                    <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
                                        {notifications.length}
                                    </span>
                                </button>
                            </div>
                            <div className="flex items-center space-x-2">
                                <img src="https://via.placeholder.com/32/4ade80/ffffff?text=U" className="w-8 h-8 rounded-full" alt="User" />
                                <span className="text-sm text-gray-700">Municipal Admin</span>
                            </div>
                        </div>
                    </div>
                </header>
            );

            const KPICard = ({ kpi }) => (
                <div className="bg-white p-6 rounded-lg shadow-sm border">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="text-lg font-semibold text-gray-800">{kpi.name}</h3>
                        <i className={`fas fa-arrow-${kpi.trend} text-${kpi.status === 'good' ? 'green' : kpi.status === 'warning' ? 'yellow' : 'red'}-500`}></i>
                    </div>
                    <div className="mb-4">
                        <div className="flex items-center justify-between mb-2">
                            <span className="text-2xl font-bold text-gray-800">{kpi.current}%</span>
                            <span className="text-sm text-gray-500">Target: {kpi.target}%</span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-2">
                            <div 
                                className={`h-2 rounded-full bg-${kpi.status === 'good' ? 'green' : kpi.status === 'warning' ? 'yellow' : 'red'}-500`}
                                style={{ width: `${kpi.current}%` }}
                            ></div>
                        </div>
                    </div>
                    <div className={`text-sm px-2 py-1 rounded ${
                        kpi.status === 'good' ? 'bg-green-100 text-green-800' : 
                        kpi.status === 'warning' ? 'bg-yellow-100 text-yellow-800' : 
                        'bg-red-100 text-red-800'
                    }`}>
                        {kpi.status === 'good' ? 'On Track' : kpi.status === 'warning' ? 'Needs Attention' : 'Critical'}
                    </div>
                </div>
            );

            const DashboardContent = () => (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {kpiData.map((kpi, index) => (
                            <KPICard key={index} kpi={kpi} />
                        ))}
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white p-6 rounded-lg shadow-sm border">
                            <h3 className="text-lg font-semibold mb-4">Performance Trends</h3>
                            <div className="h-64 flex items-center justify-center bg-gray-50 rounded">
                                <div className="text-center text-gray-500">
                                    <i className="fas fa-chart-line text-4xl mb-2"></i>
                                    <p>Performance chart visualization</p>
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-lg shadow-sm border">
                            <h3 className="text-lg font-semibold mb-4">Recent Alerts</h3>
                            <div className="space-y-3">
                                {notifications.map((notification) => (
                                    <div key={notification.id} className={`p-3 rounded border-l-4 ${
                                        notification.type === 'warning' ? 'bg-yellow-50 border-yellow-400' :
                                        notification.type === 'success' ? 'bg-green-50 border-green-400' :
                                        'bg-blue-50 border-blue-400'
                                    }`}>
                                        <p className="text-sm text-gray-800">{notification.message}</p>
                                        <p className="text-xs text-gray-500 mt-1">{notification.time}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-lg shadow-sm border">
                            <h3 className="text-lg font-semibold mb-4">Department Performance</h3>
                            <div className="space-y-4">
                                {['Water Services', 'Electricity', 'Waste Management', 'Roads & Transport'].map((dept, index) => (
                                    <div key={index} className="flex items-center justify-between">
                                        <span className="text-gray-700">{dept}</span>
                                        <div className="flex items-center space-x-2">
                                            <div className="w-20 bg-gray-200 rounded-full h-2">
                                                <div className="bg-green-500 h-2 rounded-full" style={{ width: `${85 + index * 3}%` }}></div>
                                            </div>
                                            <span className="text-sm text-gray-600">{85 + index * 3}%</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-lg shadow-sm border">
                            <h3 className="text-lg font-semibold mb-4">Compliance Status</h3>
                            <div className="space-y-4">
                                {[
                                    { name: 'CSD Registration', status: 'Active', color: 'green' },
                                    { name: 'MFMA Compliance', status: 'Compliant', color: 'green' },
                                    { name: 'PAIA Compliance', status: 'Review Required', color: 'yellow' },
                                    { name: 'POPIA Compliance', status: 'Non-compliant', color: 'red' }
                                ].map((item, index) => (
                                    <div key={index} className="flex items-center justify-between">
                                        <span className="text-gray-700">{item.name}</span>
                                        <span className={`px-2 py-1 rounded text-xs bg-${item.color}-100 text-${item.color}-800`}>
                                            {item.status}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard':
                        return <DashboardContent />;
                    case 'kpis':
                        return (
